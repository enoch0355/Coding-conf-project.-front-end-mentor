<!DOCTYPE html>
<html lang='en'>
  <head>
    <title>Conference-Form</title>
    <link rel='stylesheet' href='style.css'>
    <meta name='viewport' content='width=device-width, initial-scale = 1.0'>
    <meta charset='UTF-8'>
  </head>
  <body>
    <div class='logo'>
      <img src='logo-mark.svg' alt='logo'>
      <h5>Coding Conf</h5>
    </div>
    <section class='info'>
      <h1>Your Journey to Coding Conf 2025 Starts Here!</h1>
      <p>Secure your spot at next year's biggest <br>coding conference.</p>
    </section>
    <div class='form'>
      
      <label for='file-u'>Upload Avatar</label>
      <div id='desi-file' class='file-field'>
        <label for='file-u'>
          <img src='icon-upload.svg' alt='upload-icon'>
          <input id='file-u' type='file'>
        </label>
        <p>Drag and drop or click to upload</p>
      </div>
      <p class='imfo'><span classs='info-span'>&#x24D8; Upload your photo (JPG or PNG, max size: 500KB).</span></p>
      
      <label for='rname'>Full Name</label><br>
      <input id='rname' type='text' required><br>
       <label for='email'>Email Address</label><br>
      <input id='email' placeholder='example@email.com' type='email' required><br>
      <label>GitHuB Username</label><br>
      <input id='gname' type='text' placeholder='@yourusername' required><br>
      <button type='submit' id='sub-btn'>Generate My Ticket</button>
    </div>
    <noscript>Javascript is not supported in your browser</noscript>
    <script src='script.js'></script>
  </body>
</html>
